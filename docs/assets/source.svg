<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B35" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FF8C5A" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#121220"/>
  <rect width="100%" height="100%" fill="url(#bg)"/>
  
  <!-- Centered marker dot -->
  <circle cx="200" cy="65" r="3" fill="#FF6B35" filter="url(#glow)" opacity="0.5"/>
  
  <!-- Project name — smaller, positioned higher -->
  <text x="200" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="22"
        font-weight="700" fill="white" text-anchor="middle" letter-spacing="1.5"
        opacity="0.9">refract</text>
  
  <!-- Accent line under name -->
  <line x1="140" y1="112" x2="260" y2="112" stroke="#FF6B35" stroke-width="0.8" opacity="0.25"/>
  
  <!-- Subtitle — very small, compact -->
  <text x="200" y="132" font-family="system-ui, -apple-system, sans-serif" font-size="7"
        font-weight="300" fill="#FF8C5A" text-anchor="middle" opacity="0.5"
        letter-spacing="0.5">Open infrastructure for agent-readable knowledge change</text>
</svg>
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun x biome ci packages/
      - run: bun run typecheck
      - run: bun run check:boundaries
      - run: bun run test

  downstream:
    runs-on: ubuntu-latest
    needs: gate
    strategy:
      matrix:
        repo:
          - refract-org/refract-ui
    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ matrix.repo }}
          path: downstream/${{ matrix.repo }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - name: install and test
        working-directory: downstream/${{ matrix.repo }}
        run: |
          bun install
          bun run test
